name: Ingest

on:
  push:
    branches: [main]
    paths:
      - 'data/staging/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate staging files
        run: python scripts/validate_staging.py data/staging/*.json

      - name: Run ingest
        run: python scripts/ingest.py

      - name: Open auto-merge PR for updated articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/articles.json && echo "No changes to articles.json, skipping." && exit 0
          BRANCH="bot/ingest-$(date +%Y-%m-%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add data/articles.json
          git commit -m "chore(data): ingest staging → articles.json"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore(data): ingest staging → articles.json" \
            --body "Automated ingest of staging data into articles.json." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
